<!doctype html>
<html lang="fr">
	<head>
		<meta charset="utf-8">
		<meta name="author" content="E. Chomez">
		<meta name="keywords" content="HTML, CSS, JS">
		<meta name="description" content="Ma première page HTML avec du CSS et un peu de JavaScript">
		<!-- <meta http-equiv="refresh" value="5; contact.html"> -->
		<link rel="stylesheet" href="CSS/style.css" title="main css">
		<link rel="alternate" href="CSS/style2.css" title="secondary css">
		<link rel="icon" href="images/coffee.png" title="secondary css">
		<style>
		h1{text-align: center;}		
		p {
			font-family: Arial, sans-serif;
			font-size: 0.8em;
		}
		p.info{
			font-size: 0.5em;
			font-family: 'Times New Roman', serif;
		}
		.info {color: darkblue; }
		figcaption.info {color: darkred; }
		img {
			border: 5px double lightgrey;
			border-top: 4px dotted lightblue;
			border-top-color: gold;
			border-bottom-style: solid;
		}
		h2 {
			text-decoration: underline;
			font-family: 'Comic sans MS', sans-serif;
		}
		h2#animal {
			font-family: Impact;
			
		}
		h2#animal::before, h2#animal::after {
			content: "	\01f9ad    ";}
		
		</style>
		<title>Ma page HTML et CSS</title>
	</head>

	<body>
		<h1 style="color: #ff5566">Ma page HTML</h1>
		<h2 id="animal" style= "background-color:lightblue">Mon animal préféré</h2>
		<p style= "border:1px solid blue; padding:5px">Bonjour,</p>
		<p class="info"> Le <strong>phoque</strong>&#129453; est un <em>chien</em>.</p>
		<p class="info">C'est mignon et <em>gentil</em></p>
		<img src="images/phoque.jpg" alt="Phoque" width ="276" height="183">

		<h2 id="sport">Mon sport préféré</h2>
		<p class="info">Voici la plongée <em>sous-marine</em>, une activité plutôt sympa</p>
		<figure>
			<img src="images/plongee.jpg" alt="plongée" width="275" height="183">
			<figcaption class="info">Plongée</figcaption>
		</figure>
	</body>

</html>
