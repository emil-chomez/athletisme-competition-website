<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page de Paiement</title>
    <meta name="author" content="Khaled">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="css/main.css"> 

</head>



<body>


    <header> <!----------------- HEADER DEBUT---------->
                <div id="in-header">
                    <div id="brand">
                    <a href="index.html"> 
                        <img id="logo" src="images/logo.png" alt="logo"></a>
                    <div id="brand-text">
                    <a href="index.html"><h1>Paris Athletics<span>2026</span></h1></a>
                    </div>
                    </div>
                    <nav>
                        <a class="nav" href="index.html">Accueil</a>
                        <a class="nav" href="competitions.html">Compétition</a>
                        <a class="nav" href="tarifs.html">Billeterie</a>
                        <a class="nav" href="contact.html">Contact</a>
                    </nav>
                    <div id="searchbar">
                        <input type="text" placeholder="Rechercher..." name="searchbar">
                        <button><i class="fa fa-search"></i></button>
                    </div>
                </div>    
            </header> <!--============== HEADER FIN ===============-->



        <main>
            <h1>Paiement</h1>


            <table class="paytable">
                <thead>
                    <tr>
                        <th>Ticket</th>
                        <th>Prix total</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Nombre de tickets commandee</td> 
                        <td>Total en Euro</td> 
                    </tr>
                </tbody>
            </table>

            

            <form id="payement" action="payement/submit-payment.html" method="POST">
                <label style="margin-left: 1%;" for="payement_option">Choisissez le mode de paiement :</label>
                <select name="payement_option" id="payement_option">
                    <optgroup label="Systèmes de paiement en ligne">
                        <option value="Paypal">PayPal</option>
                        <option value="Mastercard">Mastercard</option>
                        <option value="Visa">Visa</option>
                    </optgroup>
                </select>

                <div class="row"  style="display: flex; gap: 10px; margin-top: 20px; margin-left: 1%;"> <!--css compris ! -->
                    <div>
                        <img src="images/paypal_logo.jpg" alt="Paypal" class="paylogo" width="50">
                    </div>
                    <div> 
                        <img src="images/mastercard_logo.png" alt="Mastercard" class="paylogo" width="50">
                    </div>
                    <div>
                        <img src="images/visa_logo.png" alt="Visa" class="paylogo" width="50">
                    </div>
                </div>

                
                <input id="pay_button" type="submit" value="Payer maintenant">

                <nav id="retour_button">
                    <a href="index.html" class="button">Annuler</a>
                </nav>
            </form>
        </main>
    </body>
</html>
